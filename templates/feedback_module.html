<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback & Rescheduling - Vitalis Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/facility-dashboard.css">
    <style>
        .star-rating i { font-size: 1.5rem; color: #ccc; cursor: pointer; transition: color 0.2s; }
        .star-rating i:hover { color: #ffc107; }
        .feedback-panel { background: #fdfdfd; border-left: 4px solid var(--info); padding: 1.5rem; margin-top: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<div class="dashboard-wrapper">
    <main class="main-content" style="margin-left:0; padding-top:1rem;">
        <header class="top-header">
            <div class="header-title">
                <h1><a href="/admin" style="text-decoration:none; color:inherit;"><i class="fas fa-arrow-left"></i></a> Feedback & Rescheduling</h1>
            </div>
        </header>

        <!-- Feedback Queue -->
        <div class="data-card">
            <div class="data-card-header">
                <h3><i class="fas fa-phone"></i> Pending Callbacks & Feedback Queue</h3>
            </div>
            <div class="table-responsive">
                <table class="premium-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Patient Name</th>
                            <th>Visit Status</th>
                            <th>Callback Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackTableBody">
                        <!-- Injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Feedback Form Panel -->
        <div id="feedbackPanel" class="feedback-panel" style="display:none;">
            <h3>Record Feedback for <span id="feedbackPatientName" style="color:var(--primary-color);"></span></h3>
            <form id="feedbackForm" style="margin-top:1.5rem;">
                <input type="hidden" id="currentFeedbackId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Did the patient visit the facility? *</label>
                        <select id="visitStatus" required>
                            <option value="visited">Yes, Visited</option>
                            <option value="not_visited">No, Did Not Visit</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Rating (1-5)</label>
                        <div class="star-rating" style="padding-top:10px;">
                            <i class="far fa-star" data-val="1"></i>
                            <i class="far fa-star" data-val="2"></i>
                            <i class="far fa-star" data-val="3"></i>
                            <i class="far fa-star" data-val="4"></i>
                            <i class="far fa-star" data-val="5"></i>
                        </div>
                        <input type="hidden" id="ratingValue" value="0">
                    </div>
                </div>

                <div class="form-group" id="rescheduleGroup" style="display:none; background:#fff3cd; padding:15px; border-radius:6px; margin-top:15px;">
                    <label style="color:#856404;"><i class="fas fa-calendar-alt"></i> Patient did not visit. Select Reschedule Date:</label>
                    <input type="date" id="rescheduleDate" style="border:1px solid #ffeeba;">
                    <small style="display:block; margin-top:5px; color:#856404;">An SMS notification will be automatically sent to the patient and facility.</small>
                </div>

                <div class="form-group" style="margin-top:15px;">
                    <label>Additional Comments</label>
                    <textarea id="comments" rows="3" placeholder="Patient's verbal feedback..."></textarea>
                </div>

                <button type="submit" class="btn-submit" style="margin-top:10px;">Submit Feedback & Action</button>
            </form>
        </div>
    </main>
</div>
<script src="/static/js/feedback.js"></script>
</body>
</html>
