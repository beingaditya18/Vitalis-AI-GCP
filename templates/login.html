<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vitalis AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        .auth-logo {
            font-size: 3rem;
            background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .auth-subtitle {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-control, .form-select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: #06b6d4;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(6, 182, 212, 0.25);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .form-select {
            color: white;
        }
        .form-select option {
            background: #1e293b;
            color: white;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1e3a8a 0%, #06b6d4 100%);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 600;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
            background: linear-gradient(135deg, #1e40af 0%, #0891b2 100%);
        }
        .auth-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: #06b6d4;
            text-decoration: none;
            transition: color 0.3s;
        }
        .auth-links a:hover {
            color: #8b5cf6;
        }
        .form-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 0.5rem;
            text-align: left;
            display: block;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-heartbeat"></i>
            </div>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Login to your Vitalis AI account</p>
            
            <form action="/api/auth/login" method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="doctor@vitalis.ai" required>
                </div>
                
                <div class="mb-3 text-start">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
                
                <div class="mb-3 text-start">
                    <label class="form-label">Login As</label>
                    <select name="role" class="form-select" required>
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="asha">ASHA Worker</option>
                        <option value="facility">Healthcare Facility</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div class="auth-links">
                <p>Don't have an account? <a href="/api/auth/register">Sign up here</a></p>
                <p><a href="/">Return Home</a></p>
            </div>
        </div>
    </div>
</body>
</html>
